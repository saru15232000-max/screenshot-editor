kind = "web"
previewPath = "/"
title = "Image Editor"
version = "1.0.0"
id = "artifacts/image-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21731

[services.development]
run = "pnpm --filter @workspace/image-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/image-editor", "run", "build" ]
publicDir = "artifacts/image-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21731"
BASE_PATH = "/"
