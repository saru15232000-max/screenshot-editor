kind = "web"
previewPath = "/"
title = "Screenshot Editor"
version = "1.0.0"
id = "artifacts/screenshot-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21706

[services.development]
run = "PORT=21706 BASE_PATH=/ pnpm --filter @workspace/screenshot-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/screenshot-editor", "run", "build" ]
publicDir = "artifacts/screenshot-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21706"
BASE_PATH = "/"
