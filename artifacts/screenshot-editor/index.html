<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Free Online Screenshot Editor — FlowNote</title>
    <meta name="description" content="Edit screenshots free — annotate, blur, crop, add arrows &amp; text. No signup, no upload. Runs 100% in your browser. Export PNG, JPG, WEBP instantly." />
    <meta name="keywords" content="free screenshot editor online, annotate screenshot, blur screenshot, crop screenshot, screenshot annotation tool, screenshot markup tool, edit screenshot online, add arrows to screenshot" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="FlowNote" />
    <link rel="canonical" href="https://useflownote.online/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Free Online Screenshot Editor — FlowNote" />
    <meta property="og:description" content="Annotate, blur, crop &amp; export screenshots free. No signup, no upload — 100% private, runs in your browser." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://useflownote.online/" />
    <meta property="og:image" content="https://useflownote.online/opengraph.jpg" />
    <meta property="og:site_name" content="FlowNote" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free Online Screenshot Editor — FlowNote" />
    <meta name="twitter:description" content="Annotate, blur, crop &amp; export screenshots free. No signup, no upload — 100% private." />
    <meta name="twitter:image" content="https://useflownote.online/opengraph.jpg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "FlowNote",
      "alternateName": "FlowNote Screenshot Editor",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web Browser",
      "url": "https://useflownote.online",
      "description": "Free online screenshot editor. Add text, annotations, blur, filters and export screenshots — no signup, no download, 100% private.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "1240"
      },
      "featureList": [
        "Text overlays with 21 font families",
        "18 annotation style templates",
        "AI font analyzer",
        "Color eyedropper",
        "Smart retouch brush",
        "Blur and filter controls",
        "Export PNG / JPG / WEBP",
        "100% browser-based — no uploads"
      ]
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FlowNote",
      "url": "https://useflownote.online",
      "description": "Free screenshot editor online — annotate, blur, add text and export screenshots with no signup.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://useflownote.online/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FlowNote",
      "url": "https://useflownote.online",
      "logo": "https://useflownote.online/favicon.svg",
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: BreadcrumbList for homepage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://useflownote.online/" },
        { "@type": "ListItem", "position": 2, "name": "Free Screenshot Editor", "item": "https://useflownote.online/free-screenshot-editor-online" },
        { "@type": "ListItem", "position": 3, "name": "Annotate Screenshot", "item": "https://useflownote.online/annotate-screenshot-online" },
        { "@type": "ListItem", "position": 4, "name": "Blur Screenshot", "item": "https://useflownote.online/blur-screenshot-online" }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
